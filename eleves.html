<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Techno Collège — Mes fiches</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f3ff;
    --surface: #ffffff;
    --border: rgba(99,102,241,0.15);
    --border-hover: rgba(99,102,241,0.35);
    --text: #1e1b4b;
    --text-muted: #6b7280;
    --text-hint: #a5b4fc;
    --radius-md: 8px;
    --radius-lg: 12px;
    --accent: #6366f1;
    --accent-dark: #4f46e5;
    --accent-bg: #ede9fe;
    --accent-text: #4c1d95;
    --header-bg: #1e1b4b;
    --nav-bg: #312e81;
    --green: #16a34a; --green-bg: #dcfce7;
    --orange: #d97706;
    --red: #dc2626;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0e1a; --surface: #1e1b4b;
      --border: rgba(165,180,252,0.15); --border-hover: rgba(165,180,252,0.35);
      --text: #e0e7ff; --text-muted: #a5b4fc; --text-hint: #6366f1;
      --accent: #818cf8; --accent-dark: #6366f1;
      --accent-bg: #312e81; --accent-text: #c7d2fe;
      --header-bg: #0f0e1a; --nav-bg: #1e1b4b;
      --green: #4ade80; --green-bg: #14532d;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; font-size: 15px; line-height: 1.5;
  }

  /* ── Header ── */
  header {
    background: var(--header-bg);
    padding: 0 1.25rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 54px; position: sticky; top: 0; z-index: 30;
  }
  .logo {
    display: flex; align-items: center; gap: 9px;
    font-weight: 600; font-size: 15px; color: #e0e7ff; text-decoration: none;
  }
  .logo-icon {
    width: 32px; height: 32px; background: #6366f1;
    border-radius: 8px; display: flex; align-items: center;
    justify-content: center; color: #fff; font-size: 17px;
  }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .search-inline {
    display: flex; align-items: center; gap: 7px;
    background: rgba(255,255,255,0.08); border-radius: 8px;
    padding: 6px 11px; color: #a5b4fc; font-size: 13px;
  }
  .search-inline input {
    background: none; border: none; outline: none;
    color: #e0e7ff; font-size: 13px; font-family: inherit;
    width: 160px;
  }
  .search-inline input::placeholder { color: #a5b4fc; }
  .header-badge {
    background: rgba(165,180,252,0.15);
    color: #a5b4fc; border-radius: 6px;
    padding: 4px 10px; font-size: 12px;
  }

  /* ── Nav niveaux ── */
  nav {
    background: var(--nav-bg); padding: 0 1.25rem;
    display: flex; gap: 0; overflow-x: auto; position: sticky; top: 54px; z-index: 20;
  }
  .nav-tab {
    padding: 12px 20px; font-size: 14px; font-weight: 500; cursor: pointer;
    border: none; border-bottom: 3px solid transparent;
    color: rgba(165,180,252,0.7); background: none; white-space: nowrap;
    font-family: inherit; transition: color 0.15s;
  }
  .nav-tab:hover { color: #e0e7ff; }
  .nav-tab.active { color: #fff; border-bottom-color: #818cf8; }
  .nav-count {
    display: inline-flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.15); border-radius: 10px;
    padding: 1px 7px; font-size: 11px; margin-left: 6px;
    font-weight: 400;
  }

  /* ── Main ── */
  main { padding: 1rem 1.25rem 2rem; max-width: 1400px; margin: 0 auto; }

  /* ── Barre historique compacte ── */
  .history-bar {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: var(--radius-md); padding: 8px 12px;
    margin-bottom: 1rem; cursor: pointer;
  }
  .history-bar:hover { border-color: var(--accent); }
  .history-scores { display: flex; gap: 6px; flex-wrap: wrap; margin-left: 4px; }
  .hs-chip {
    font-size: 11px; padding: 2px 8px; border-radius: 10px;
    border: 0.5px solid var(--border-hover); color: var(--text-muted);
    text-decoration: none; transition: all 0.12s;
  }
  .hs-chip:hover { border-color: var(--accent); background: var(--accent-bg); color: var(--accent-text); }
  .hs-green { border-color: #86efac; background: #f0fdf4; color: #15803d; }
  .hs-orange { border-color: #fcd34d; background: #fffbeb; color: #92400e; }
  .hs-red { border-color: #fca5a5; background: #fef2f2; color: #b91c1c; }
  @media (prefers-color-scheme: dark) {
    .hs-green { border-color: #166534; background: #14532d; color: #4ade80; }
    .hs-orange { border-color: #78350f; background: #451a03; color: #fcd34d; }
    .hs-red { border-color: #7f1d1d; background: #450a0a; color: #f87171; }
  }
  .history-actions-inline { margin-left: auto; display: flex; gap: 8px; }
  .hbtn { font-size: 11px; color: var(--text-hint); background: none; border: none; cursor: pointer; font-family: inherit; }
  .hbtn:hover { color: var(--accent); }

  /* ── Filtres thème ── */
  .filter-bar {
    display: flex; align-items: center; gap: 6px;
    flex-wrap: wrap; margin-bottom: 1rem;
  }
  .filter-label { font-size: 11px; font-weight: 600; color: var(--text-hint); text-transform: uppercase; letter-spacing: .05em; margin-right: 2px; }
  .chip {
    border: 0.5px solid var(--border-hover); border-radius: 20px;
    padding: 5px 12px; font-size: 12px; cursor: pointer;
    background: transparent; color: var(--text-muted);
    font-family: inherit; display: inline-flex; align-items: center;
    gap: 4px; transition: all 0.15s;
  }
  .chip:hover, .chip.active {
    background: var(--accent-bg); border-color: var(--accent); color: var(--accent-text);
  }

  /* ── Section titre (groupe de thème) ── */
  .theme-section { margin-bottom: 2rem; }
  .theme-heading {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 0.85rem; padding-bottom: 8px;
    border-bottom: 2px solid var(--accent-bg);
  }
  .theme-icon {
    width: 30px; height: 30px; border-radius: 8px;
    background: var(--accent-bg); color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; flex-shrink: 0;
  }
  .theme-name {
    font-size: 14px; font-weight: 700; color: var(--text);
  }
  .theme-count {
    font-size: 12px; color: var(--text-muted); margin-left: 4px;
  }

  /* ── Sous-thème ── */
  .subtheme-section { margin-bottom: 1.5rem; }
  .subtheme-heading {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 0.65rem; margin-left: 2px;
  }
  .subtheme-code {
    font-size: 10px; font-weight: 700; padding: 2px 8px;
    border-radius: 10px; letter-spacing: .02em; flex-shrink: 0;
  }
  .code-ost  { background: #dcfce7; color: #15803d; }
  .code-sfc  { background: #dbeafe; color: #1d4ed8; }
  .code-ccri { background: #ffedd5; color: #c2410c; }
  @media (prefers-color-scheme: dark) {
    .code-ost  { background: #14532d; color: #4ade80; }
    .code-sfc  { background: #1e3a5f; color: #93c5fd; }
    .code-ccri { background: #431407; color: #fdba74; }
  }
  .subtheme-name { font-size: 12px; font-weight: 600; color: var(--text-muted); }

  /* Badge code programme sur la carte */
  .card-code {
    font-size: 10px; font-weight: 700; padding: 1px 6px;
    border-radius: 8px; display: inline-block;
  }

  /* Critère court */
  .card-critere {
    font-size: 10px; color: var(--text-hint); line-height: 1.3;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* ── Grille de fiches ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 14px;
  }

  /* ── Carte fiche — format document portrait ── */
  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    overflow: hidden;
    display: flex; flex-direction: column;
    transition: box-shadow 0.15s, transform 0.15s, border-color 0.15s;
    position: relative;
  }
  .card:hover {
    box-shadow: 0 8px 24px rgba(99,102,241,0.16);
    transform: translateY(-4px);
    border-color: var(--border-hover);
  }

  /* Miniature format A4 */
  .card-thumb {
    aspect-ratio: 210 / 297;
    background: #fff;
    border-bottom: 0.5px solid var(--border);
    overflow: hidden;
    flex-shrink: 0;
    position: relative;
  }
  .card-thumb img {
    width: 100%; height: 100%;
    object-fit: contain;
    display: block;
    transition: transform 0.3s;
  }
  .card:hover .card-thumb img { transform: scale(1.03); }

  /* Badge niveau en surimpression */
  .level-badge {
    position: absolute; top: 6px; left: 6px;
    font-size: 10px; font-weight: 700; padding: 2px 7px;
    border-radius: 8px; pointer-events: none;
  }
  .lb-5 { background: #FAEEDA; color: #633806; }
  .lb-4 { background: #FAECE7; color: #712B13; }
  .lb-3 { background: #EEEDFE; color: #3C3489; }
  @media (prefers-color-scheme: dark) {
    .lb-5 { background: #412402; color: #FAC775; }
    .lb-4 { background: #4A1B0C; color: #F0997B; }
    .lb-3 { background: #26215C; color: #AFA9EC; }
  }

  /* Badge score quiz en surimpression */
  .score-badge {
    position: absolute; top: 6px; right: 6px;
    font-size: 10px; font-weight: 700; padding: 2px 7px;
    border-radius: 8px; pointer-events: none;
  }

  /* Corps de la carte */
  .card-body {
    padding: 8px 10px 10px;
    flex: 1; display: flex; flex-direction: column; gap: 8px;
  }
  .card-title {
    font-size: 12px; font-weight: 600; line-height: 1.35;
    color: var(--text);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* Boutons action */
  .card-actions { display: flex; gap: 5px; margin-top: auto; }
  .btn-open, .btn-quiz {
    flex: 1; display: inline-flex; align-items: center; justify-content: center;
    gap: 4px; padding: 6px 4px;
    border-radius: 6px; font-size: 11px; font-weight: 500;
    text-decoration: none; border: 0.5px solid var(--border-hover);
    transition: all 0.15s; font-family: inherit; cursor: pointer;
  }
  .btn-open { background: transparent; color: var(--text-muted); }
  .btn-open:hover { background: var(--accent-bg); color: var(--accent-text); border-color: var(--accent); }
  .btn-quiz { background: var(--accent-bg); color: var(--accent-text); border-color: transparent; }
  .btn-quiz:hover { background: var(--accent); color: #fff; }

  /* ── Carte séquence — placeholder visuel ── */
  .seq-thumb {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 10px;
    background: linear-gradient(145deg, var(--accent-bg) 0%, rgba(99,102,241,0.06) 100%);
    color: var(--accent);
  }
  .seq-thumb i { font-size: 38px; opacity: .65; }
  .seq-num {
    font-size: 10px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase;
    background: rgba(99,102,241,0.14); color: var(--accent-dark);
    padding: 3px 10px; border-radius: 12px;
  }

  /* Empty */
  .empty {
    text-align: center; padding: 4rem 1rem; color: var(--text-muted);
    grid-column: 1/-1; font-size: 14px;
  }
  .empty i { font-size: 36px; display: block; margin-bottom: 8px; color: var(--text-hint); }

  /* Responsive */
  @media (max-width: 480px) {
    .search-inline { display: none; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="#">
    <div class="logo-icon"><i class="ti ti-tool"></i></div>
    Techno Collège
  </a>
  <div class="header-right">
    <div class="search-inline">
      <i class="ti ti-search" style="font-size:14px"></i>
      <input type="text" id="search" placeholder="Chercher…" oninput="render()">
    </div>
    <span class="header-badge"><i class="ti ti-users"></i> Vue élèves</span>
  </div>
</header>

<nav id="nav-bar">
  <button class="nav-tab active" onclick="setTab(this,'')">
    Tout <span class="nav-count" id="cnt-all">0</span>
  </button>
  <button class="nav-tab" onclick="setTab(this,'5')">
    5ème <span class="nav-count" id="cnt-5">0</span>
  </button>
  <button class="nav-tab" onclick="setTab(this,'4')">
    4ème <span class="nav-count" id="cnt-4">0</span>
  </button>
  <button class="nav-tab" onclick="setTab(this,'3')">
    3ème <span class="nav-count" id="cnt-3">0</span>
  </button>
  <button class="nav-tab" id="tab-conn" onclick="setTab(this,'connaissance')">
    Connaissances <span class="nav-count" id="cnt-conn">0</span>
  </button>
  <button class="nav-tab" onclick="setTab(this,'outil')">
    Outils <span class="nav-count" id="cnt-outil">0</span>
  </button>
</nav>

<main>
  <!-- Historique compact -->
  <div class="history-bar" id="history-bar" style="display:none">
    <i class="ti ti-user-circle" style="color:var(--accent);font-size:16px;flex-shrink:0"></i>
    <span id="history-name-lbl" style="font-size:13px;font-weight:600"></span>
    <div class="history-scores" id="history-scores"></div>
    <div class="history-actions-inline">
      <button class="hbtn" onclick="changeName()"><i class="ti ti-pencil"></i></button>
      <button class="hbtn" onclick="clearHistory()" style="color:var(--red)"><i class="ti ti-trash"></i></button>
    </div>
  </div>

  <!-- Filtres thème -->
  <div class="filter-bar" id="theme-row"></div>

  <div id="content"></div>
</main>

<script>
const THEME_ICON = {
  'Objets et systèmes techniques': 'ti-cpu',
  'Structure et fonctionnement':   'ti-settings-2',
  'Conception et réalisation':     'ti-ruler-2',
  'Énergie':                       'ti-bolt',
  'Matériaux':                     'ti-building-factory',
  'Mécanique':                     'ti-tool',
  'Numérique':                     'ti-device-laptop',
  'Réseaux':                       'ti-network',
  'Programmation':                 'ti-code',
  'Projet':                        'ti-checklist',
  'Développement durable':         'ti-leaf',
  'Communication':                 'ti-antenna',
};
const BASE = 'https://robicy-sys.github.io/techno-college/';

let resources = [];
let tabNiv = '';
let themeFilter = '';
let quizResults = [];
let seqFilter = null; // ID séquence sélectionnée (onglet Connaissances)

async function load() {
  try {
    const r = await fetch('./ressources.json?_=' + Date.now());
    if (r.ok) {
      const d = await r.json();
      if (Array.isArray(d.resources)) {
        resources = d.resources;
        updateCounts();
        buildThemes();
        render();
        loadHistory();
        return;
      }
    }
  } catch(e) {}
  document.getElementById('content').innerHTML = '<div class="empty"><i class="ti ti-wifi-off"></i>Impossible de charger les ressources.</div>';
}

function isCours(r) { return !r.categorie || r.categorie === 'cours'; }

function updateCounts() {
  document.getElementById('cnt-all').textContent = resources.length;
  document.getElementById('cnt-5').textContent = resources.filter(r => isCours(r) && r.niveau === '5').length;
  document.getElementById('cnt-4').textContent = resources.filter(r => isCours(r) && r.niveau === '4').length;
  document.getElementById('cnt-3').textContent = resources.filter(r => isCours(r) && r.niveau === '3').length;
  document.getElementById('cnt-conn').textContent = resources.filter(r => r.categorie === 'connaissance').length;
  document.getElementById('cnt-outil').textContent = resources.filter(r => r.categorie === 'outil').length;
}

function setTab(el, niv) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  tabNiv = niv; themeFilter = ''; seqFilter = null;
  buildThemes(); render();
}

function viewSeq(seqId) {
  seqFilter = seqId;
  tabNiv = 'connaissance'; themeFilter = '';
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-conn').classList.add('active');
  buildThemes(); render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function buildThemes() {
  const row = document.getElementById('theme-row');
  row.innerHTML = '';

  // Quand on filtre par séquence : afficher un chip de retour + titre séquence
  if (seqFilter) {
    const seq = resources.find(r => r.id === seqFilter);
    const back = document.createElement('button');
    back.className = 'chip active';
    back.innerHTML = `<i class="ti ti-arrow-left" style="font-size:11px"></i> Toutes les connaissances`;
    back.onclick = () => { seqFilter = null; buildThemes(); render(); };
    row.appendChild(back);
    if (seq) {
      const lbl = document.createElement('span');
      lbl.style.cssText = 'font-size:12px;color:var(--text-muted);margin-left:4px';
      lbl.innerHTML = `Fiches de : <strong>${escHtml(seq.titre)}</strong>`;
      row.appendChild(lbl);
    }
    return;
  }

  const visible = resources.filter(r => matchTab(r));
  const themes = [...new Set(visible.map(r => r.theme).filter(Boolean))].sort();
  if (themes.length <= 1) return;
  const lbl = document.createElement('span');
  lbl.className = 'filter-label'; lbl.textContent = 'Thème :';
  row.appendChild(lbl);
  const all = document.createElement('button');
  all.className = 'chip active'; all.textContent = 'Tous';
  all.onclick = () => { themeFilter = ''; document.querySelectorAll('#theme-row .chip').forEach(c => c.classList.remove('active')); all.classList.add('active'); render(); };
  row.appendChild(all);
  themes.forEach(th => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.innerHTML = `<i class="ti ${THEME_ICON[th]||'ti-folder'}" style="font-size:12px"></i> ${escHtml(th)}`;
    btn.onclick = () => {
      themeFilter = th;
      document.querySelectorAll('#theme-row .chip').forEach(c => c.classList.remove('active'));
      btn.classList.add('active'); render();
    };
    row.appendChild(btn);
  });
}

function matchTab(r) {
  const cat = r.categorie || 'cours';
  if (tabNiv === 'connaissance') return cat === 'connaissance';
  if (tabNiv === 'outil')        return cat === 'outil';
  if (tabNiv)                    return cat === 'cours' && r.niveau === tabNiv;
  return true;
}

function render() {
  const q = (document.getElementById('search').value || '').toLowerCase().trim();
  const filtered = resources.filter(r => {
    if (!matchTab(r)) return false;
    if (seqFilter !== null && r.parent_seq !== seqFilter) return false;
    if (themeFilter && r.theme !== themeFilter) return false;
    if (q && ![r.titre, r.desc, r.theme, r.sous_theme, r.code, r.critere].some(v => (v||'').toLowerCase().includes(q))) return false;
    return true;
  });

  const content = document.getElementById('content');
  if (!filtered.length) {
    content.innerHTML = '<div class="grid"><div class="empty"><i class="ti ti-search-off"></i>Aucune fiche trouvée</div></div>';
    return;
  }

  // Séquences : grille plate sans groupement thématique
  const seqs = filtered.filter(r => r.type === 'sequence');
  const docs = filtered.filter(r => r.type !== 'sequence');

  let html = '';
  if (seqs.length) {
    html += `<div class="grid">${seqs.map(r => cardHtml(r)).join('')}</div>`;
  }

  if (docs.length) {
    const byTheme = {};
    docs.forEach(r => {
      const th = r.theme || 'Général';
      const st = r.sous_theme || 'Autre';
      if (!byTheme[th]) byTheme[th] = {};
      if (!byTheme[th][st]) byTheme[th][st] = [];
      byTheme[th][st].push(r);
    });
    html += Object.entries(byTheme).map(([theme, subthemes]) => {
      const totalCards = Object.values(subthemes).flat().length;
      const subHtml = Object.entries(subthemes).map(([st, items]) => {
        const stCode = items[0].code || '';
        const codeClass = stCode.startsWith('OST') ? 'code-ost' : stCode.startsWith('SFC') ? 'code-sfc' : 'code-ccri';
        return `<div class="subtheme-section">
          <div class="subtheme-heading">
            <span class="subtheme-code ${codeClass}">${escHtml(stCode)}</span>
            <span class="subtheme-name">${escHtml(st)}</span>
          </div>
          <div class="grid">${items.map(r => cardHtml(r)).join('')}</div>
        </div>`;
      }).join('');
      return `<div class="theme-section">
        <div class="theme-heading">
          <div class="theme-icon"><i class="ti ${THEME_ICON[theme]||'ti-folder'}"></i></div>
          <span class="theme-name">${escHtml(theme)}</span>
          <span class="theme-count">${totalCards} fiche${totalCards > 1 ? 's' : ''}</span>
        </div>
        ${subHtml}
      </div>`;
    }).join('');
  }

  content.innerHTML = html;
}

function cardHtml(r) {
  const url = r.url ? (r.url.startsWith('http') ? r.url : BASE + r.url) : null;
  const openBtn = url
    ? `<a href="${escHtml(url)}" target="_blank" rel="noopener" class="btn-open"><i class="ti ti-external-link" style="font-size:11px"></i> Ouvrir</a>`
    : `<span class="btn-open" style="opacity:.4;cursor:default"><i class="ti ti-external-link" style="font-size:11px"></i> Ouvrir</span>`;
  const quizBtn = `<a href="quiz/?id=${r.id}&from=eleves" class="btn-quiz"><i class="ti ti-brain" style="font-size:11px"></i> Quiz</a>`;

  // Score badge si déjà fait
  const myResult = quizResults.find(res => res.id == r.id);
  const scoreBadge = myResult ? (() => {
    const pct = Math.round(myResult.score / myResult.total * 100);
    const [bg, col] = pct >= 80 ? ['#dcfce7','#15803d'] : pct >= 60 ? ['#fffbeb','#92400e'] : ['#fef2f2','#b91c1c'];
    return `<div class="score-badge" style="background:${bg};color:${col}">${myResult.score}/${myResult.total}</div>`;
  })() : '';

  // Badge code programme
  const codeClass = (r.code||'').startsWith('OST') ? 'code-ost' : (r.code||'').startsWith('SFC') ? 'code-sfc' : 'code-ccri';
  const codeBadge = r.code ? `<span class="card-code ${codeClass}">${escHtml(r.code)}</span>` : '';

  // Critère (partie après « — »)
  const critereShort = r.critere ? r.critere.split(' — ').slice(1).join(' — ') : '';
  const critereHtml = critereShort ? `<div class="card-critere">${escHtml(critereShort)}</div>` : '';

  if (r.type === 'sequence') {
    const subCount = resources.filter(s => s.parent_seq === r.id).length;
    const voirBtn = subCount > 0
      ? `<button class="btn-open" onclick="viewSeq(${r.id})" style="flex:1;cursor:pointer"><i class="ti ti-books" style="font-size:11px"></i> Voir (${subCount})</button>`
      : `<span class="btn-open" style="opacity:.35;cursor:default;flex:1"><i class="ti ti-books" style="font-size:11px"></i> Aucune</span>`;
    const subDone = quizResults.filter(qr => resources.find(s => s.parent_seq === r.id && s.id == qr.id)).length;
    const progressBadge = subCount > 0 && subDone > 0
      ? `<div class="score-badge" style="background:#dbeafe;color:#1d4ed8">${subDone}/${subCount}</div>` : '';
    return `<div class="card">
      <div class="card-thumb">
        <div class="seq-thumb"><span class="seq-num">Séq. ${r.seq_num||''}</span><i class="ti ti-book"></i></div>
        <div class="level-badge lb-${r.niveau}">${r.niveau}ème</div>
        ${progressBadge}
      </div>
      <div class="card-body">
        <div class="card-title">${escHtml(r.titre)}</div>
        <div class="card-actions">${voirBtn}</div>
      </div>
    </div>`;
  }

  return `<div class="card" title="${escHtml(r.critere||'')}">
    <div class="card-thumb">
      <img src="img/thumbs/thumb-${r.id}.png" alt="${escHtml(r.titre)}" loading="lazy" onerror="this.style.opacity='.3'">
      <div class="level-badge lb-${r.niveau}">${r.niveau}ème</div>
      ${scoreBadge}
    </div>
    <div class="card-body">
      ${codeBadge}
      <div class="card-title">${escHtml(r.titre)}</div>
      ${critereHtml}
      <div class="card-actions">${openBtn}${quizBtn}</div>
    </div>
  </div>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Historique quiz ──────────────────────────────────────────────────────────

function loadHistory() {
  const name = localStorage.getItem('tc_student_name');
  if (!name) return;
  const all = JSON.parse(localStorage.getItem('tc_quiz_results') || '[]');
  quizResults = all.filter(r => r.nom === name);
  if (!quizResults.length) return;

  document.getElementById('history-name-lbl').textContent = name;
  document.getElementById('history-bar').style.display = 'flex';

  document.getElementById('history-scores').innerHTML = quizResults
    .sort((a, b) => new Date(b.date) - new Date(a.date))
    .map(r => {
      const pct = Math.round(r.score / r.total * 100);
      const cls = pct >= 80 ? 'hs-green' : pct >= 60 ? 'hs-orange' : 'hs-red';
      return `<a href="quiz/?id=${r.id}&from=eleves" class="hs-chip ${cls}" title="${escHtml(r.titre)}">${r.score}/${r.total}</a>`;
    }).join('');

  // Rafraîchir les badges sur les cartes
  render();
}

function changeName() {
  const newName = prompt('Ton prénom :', localStorage.getItem('tc_student_name') || '');
  if (newName !== null && newName.trim()) {
    localStorage.setItem('tc_student_name', newName.trim());
    quizResults = [];
    loadHistory();
  }
}

function clearHistory() {
  if (!confirm('Effacer tout ton historique de quiz ?')) return;
  const name = localStorage.getItem('tc_student_name');
  const all = JSON.parse(localStorage.getItem('tc_quiz_results') || '[]');
  localStorage.setItem('tc_quiz_results', JSON.stringify(all.filter(r => r.nom !== name)));
  quizResults = [];
  document.getElementById('history-bar').style.display = 'none';
  render();
}

load();
</script>
