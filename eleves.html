<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Techno Collège — Ressources</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f3ff;
    --surface: #ffffff;
    --border: rgba(99,102,241,0.15);
    --border-hover: rgba(99,102,241,0.35);
    --text: #1e1b4b;
    --text-muted: #6b7280;
    --text-hint: #a5b4fc;
    --radius-md: 8px;
    --radius-lg: 12px;
    --accent: #6366f1;
    --accent-dark: #4f46e5;
    --accent-bg: #ede9fe;
    --accent-text: #4c1d95;
    --header-bg: #1e1b4b;
    --nav-bg: #312e81;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f0e1a; --surface: #1e1b4b;
      --border: rgba(165,180,252,0.15); --border-hover: rgba(165,180,252,0.35);
      --text: #e0e7ff; --text-muted: #a5b4fc; --text-hint: #6366f1;
      --accent: #818cf8; --accent-dark: #6366f1;
      --accent-bg: #312e81; --accent-text: #c7d2fe;
      --header-bg: #0f0e1a; --nav-bg: #1e1b4b;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; font-size: 15px; line-height: 1.5;
  }

  header {
    background: var(--header-bg);
    padding: 0 1.5rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 58px; position: sticky; top: 0; z-index: 20;
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
    font-weight: 500; font-size: 16px; color: #e0e7ff; text-decoration: none;
  }
  .logo-icon {
    width: 34px; height: 34px; background: #6366f1;
    border-radius: 9px; display: flex; align-items: center;
    justify-content: center; color: #fff; font-size: 18px;
  }
  .header-badge {
    background: rgba(165,180,252,0.15);
    color: #a5b4fc; border-radius: 6px;
    padding: 4px 10px; font-size: 12px;
  }

  nav {
    background: var(--nav-bg); padding: 0 1.5rem;
    display: flex; gap: 2px; overflow-x: auto;
  }
  .nav-tab {
    padding: 11px 15px; font-size: 14px; cursor: pointer;
    border: none; border-bottom: 2px solid transparent;
    color: #a5b4fc; background: none; white-space: nowrap;
    font-family: inherit; transition: color 0.15s;
  }
  .nav-tab:hover { color: #e0e7ff; }
  .nav-tab.active { color: #fff; border-bottom-color: #a5b4fc; font-weight: 500; }

  main { padding: 1.5rem; max-width: 1200px; margin: 0 auto; }

  .search-wrap { position: relative; max-width: 400px; margin-bottom: 1rem; }
  .search-wrap .ti {
    position: absolute; left: 12px; top: 50%;
    transform: translateY(-50%); color: var(--text-hint); font-size: 17px; pointer-events: none;
  }
  .search-wrap input {
    width: 100%; padding: 10px 12px 10px 38px;
    border: 0.5px solid var(--border-hover);
    border-radius: var(--radius-lg); font-size: 14px;
    background: var(--surface); color: var(--text);
    font-family: inherit; outline: none;
  }
  .search-wrap input:focus { border-color: var(--accent); }

  .filter-row { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .chip {
    border: 0.5px solid var(--border-hover); border-radius: 20px;
    padding: 6px 15px; font-size: 13px; cursor: pointer;
    background: transparent; color: var(--text-muted);
    font-family: inherit; display: inline-flex; align-items: center;
    gap: 5px; transition: all 0.15s;
  }
  .chip:hover, .chip.active {
    background: var(--accent-bg); border-color: var(--accent); color: var(--accent-text);
  }

  .section-title {
    font-size: 13px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: .05em;
    margin: 1.5rem 0 0.75rem;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }

  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 0;
    transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .card:hover {
    border-color: var(--accent);
    box-shadow: 0 6px 20px rgba(99,102,241,0.13);
    transform: translateY(-3px);
  }
  .card-link {
    display: block; text-decoration: none; color: inherit; cursor: pointer;
  }
  .card-img { height: 140px; overflow: hidden; flex-shrink: 0; background: var(--accent-bg); }
  .card-img img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.3s; }
  .card:hover .card-img img { transform: scale(1.05); }
  .card-img-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 44px; color: var(--accent);
  }
  .card-body { padding: 1rem 1.1rem; flex: 1; display: flex; flex-direction: column; }
  .card-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
  .card-icon {
    width: 36px; height: 36px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .card-meta { flex: 1; min-width: 0; }
  .card-title { font-size: 14px; font-weight: 600; line-height: 1.3; margin-bottom: 3px; }
  .card-sub { font-size: 12px; color: var(--text-muted); }
  .card-desc { font-size: 13px; color: var(--text-muted); line-height: 1.55; margin-bottom: 10px; flex: 1; }
  .card-footer { display: flex; align-items: center; gap: 6px; }
  .badge { font-size: 11px; padding: 3px 10px; border-radius: 12px; font-weight: 500; }

  .b-5 { background: #FAEEDA; color: #633806; }
  .b-4 { background: #FAECE7; color: #712B13; }
  .b-3 { background: #EEEDFE; color: #3C3489; }
  .b-doc { background: #E6F1FB; color: #0C447C; }
  .b-vid { background: #FBEAF0; color: #72243E; }
  .b-lien { background: #EAF3DE; color: #27500A; }
  .b-ex { background: #FAEEDA; color: #633806; }
  .b-seq { background: #F0F4FF; color: #3451B2; }

  @media (prefers-color-scheme: dark) {
    .b-5 { background: #412402; color: #FAC775; }
    .b-4 { background: #4A1B0C; color: #F0997B; }
    .b-3 { background: #26215C; color: #AFA9EC; }
    .b-doc { background: #042C53; color: #85B7EB; }
    .b-vid { background: #4B1528; color: #ED93B1; }
    .b-lien { background: #173404; color: #97C459; }
    .b-ex { background: #412402; color: #EF9F27; }
    .b-seq { background: #1e2a5c; color: #93aff5; }
  }

  .open-icon { margin-left: auto; color: var(--accent); font-size: 16px; }
  .card-quiz-row {
    margin-top: 10px; padding-top: 10px; border-top: 0.5px solid var(--border);
    display: flex; gap: 6px;
  }
  .quiz-btn, .open-btn {
    display: inline-flex; align-items: center; gap: 5px;
    flex: 1; justify-content: center;
    padding: 8px 6px; border-radius: var(--radius-md);
    font-size: 13px; font-weight: 500; text-decoration: none;
    border: 1px solid var(--border-hover); transition: all 0.15s;
  }
  .quiz-btn {
    background: var(--accent-bg); color: var(--accent-text);
  }
  .quiz-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
  .open-btn {
    background: transparent; color: var(--text-muted);
  }
  .open-btn:hover { background: var(--accent-bg); color: var(--accent-text); border-color: var(--accent); }

  .empty {
    text-align: center; padding: 4rem 1rem;
    color: var(--text-muted); grid-column: 1/-1;
  }
  .empty .ti { font-size: 40px; display: block; margin-bottom: 10px; color: var(--text-hint); }
</style>
</head>
<body>

<header>
  <a class="logo" href="#">
    <div class="logo-icon"><i class="ti ti-tool"></i></div>
    Techno Collège
  </a>
  <span class="header-badge"><i class="ti ti-users"></i> Vue élèves</span>
</header>

<nav>
  <button class="nav-tab active" onclick="setTab(this,'')">Tout</button>
  <button class="nav-tab" onclick="setTab(this,'5')">5ème</button>
  <button class="nav-tab" onclick="setTab(this,'4')">4ème</button>
  <button class="nav-tab" onclick="setTab(this,'3')">3ème</button>
</nav>

<main>
  <div class="search-wrap">
    <i class="ti ti-search"></i>
    <input type="text" id="search" placeholder="Chercher une fiche, un thème…" oninput="render()">
  </div>
  <div class="filter-row" id="theme-row"></div>
  <div id="content"></div>
</main>

<script>
const TYPE_LBL = { document:'Document', video:'Vidéo', lien:'Lien', exercice:'Exercice', sequence:'Séquence' };
const THEME_IMG = {
  'Objets et systèmes techniques': 'img/themes/systemes.jpg',
  'Structure et fonctionnement':   'img/themes/mecanique.jpg',
  'Conception et réalisation':     'img/themes/conception.jpg',
  'Énergie':                       'img/themes/energie.jpg',
  'Matériaux':                     'img/themes/materiaux.jpg',
  'Mécanique':                     'img/themes/mecanique.jpg',
  'Numérique':                     'img/themes/numerique.jpg',
  'Réseaux':                       'img/themes/reseaux.jpg',
  'Programmation':                 'img/themes/programmation.jpg',
  'Projet':                        'img/themes/projet.jpg',
  'Développement durable':         'img/themes/developpement-durable.jpg',
  'Communication':                 'img/themes/communication.jpg',
};
const THEME_ICON = {
  'Objets et systèmes techniques': 'ti-cpu',
  'Structure et fonctionnement':   'ti-settings',
  'Conception et réalisation':     'ti-ruler-2',
  'Énergie':                       'ti-bolt',
  'Matériaux':                     'ti-building-factory',
  'Mécanique':                     'ti-tool',
  'Numérique':                     'ti-device-laptop',
  'Réseaux':                       'ti-network',
  'Programmation':                 'ti-code',
  'Projet':                        'ti-checklist',
  'Développement durable':         'ti-leaf',
  'Communication':                 'ti-antenna',
};
const ICONS = {
  document: { i: 'ti-file-text', bg: '#E6F1FB', c: '#185FA5' },
  video:    { i: 'ti-video',     bg: '#FBEAF0', c: '#99355A' },
  lien:     { i: 'ti-link',      bg: '#EAF3DE', c: '#3B6D11' },
  exercice: { i: 'ti-pencil',    bg: '#FAEEDA', c: '#854F0B' },
  sequence: { i: 'ti-list-details', bg: '#F0F4FF', c: '#3451B2' },
};
const BASE = 'https://robicy-sys.github.io/techno-college/';

let resources = [];
let tabNiv = '';
let themeFilter = '';

async function load() {
  try {
    const r = await fetch('./ressources.json?_=' + Date.now());
    if (r.ok) { const d = await r.json(); if (Array.isArray(d.resources)) { resources = d.resources; render(); return; } }
  } catch(e) {}
  document.getElementById('content').innerHTML = '<div class="empty"><i class="ti ti-wifi-off"></i>Impossible de charger les ressources.</div>';
}

function setTab(el, niv) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active'); tabNiv = niv; themeFilter = ''; buildThemes(); render();
}

function buildThemes() {
  const themes = [...new Set(
    resources.filter(r => !tabNiv || r.niveau === tabNiv).map(r => r.theme).filter(Boolean)
  )].sort();
  const row = document.getElementById('theme-row');
  row.innerHTML = '';
  if (themes.length <= 1) return;
  const all = document.createElement('button');
  all.className = 'chip active'; all.textContent = 'Tous les thèmes';
  all.onclick = () => { themeFilter = ''; document.querySelectorAll('#theme-row .chip').forEach(c => c.classList.remove('active')); all.classList.add('active'); render(); };
  row.appendChild(all);
  themes.forEach(th => {
    const btn = document.createElement('button');
    btn.className = 'chip'; btn.textContent = th;
    btn.onclick = () => {
      themeFilter = th;
      document.querySelectorAll('#theme-row .chip').forEach(c => c.classList.remove('active'));
      btn.classList.add('active'); render();
    };
    row.appendChild(btn);
  });
}

function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const filtered = resources.filter(r => {
    if (tabNiv && r.niveau !== tabNiv) return false;
    if (themeFilter && r.theme !== themeFilter) return false;
    if (q && !r.titre.toLowerCase().includes(q) && !(r.desc||'').toLowerCase().includes(q) && !(r.theme||'').toLowerCase().includes(q)) return false;
    return true;
  });

  const content = document.getElementById('content');
  if (!filtered.length) {
    content.innerHTML = '<div class="grid"><div class="empty"><i class="ti ti-search-off"></i>Aucune fiche trouvée</div></div>';
    return;
  }

  // Grouper par thème
  const byTheme = {};
  filtered.forEach(r => {
    const k = r.theme || 'Général';
    if (!byTheme[k]) byTheme[k] = [];
    byTheme[k].push(r);
  });

  content.innerHTML = Object.entries(byTheme).map(([theme, items]) => `
    <div class="section-title"><i class="ti ti-folder" style="margin-right:5px"></i>${escHtml(theme)}</div>
    <div class="grid" style="margin-bottom:1rem">
      ${items.map(r => cardHtml(r)).join('')}
    </div>
  `).join('');
}

function cardHtml(r) {
  const ic = ICONS[r.type] || ICONS.document;
  const url = r.url ? (r.url.startsWith('http') ? r.url : BASE + r.url) : null;
  const openBtn = url
    ? `<a href="${escHtml(url)}" target="_blank" rel="noopener" class="open-btn" title="Ouvrir la fiche"><i class="ti ti-external-link"></i> Ouvrir</a>`
    : '';
  const quizBtn = `<a href="quiz/?id=${r.id}&from=eleves" class="quiz-btn"><i class="ti ti-brain"></i> Quiz</a>`;
  const imgSrc = THEME_IMG[r.theme];
  const imgHtml = imgSrc
    ? `<div class="card-img"><img src="${escHtml(imgSrc)}" alt="${escHtml(r.theme||'')}" loading="lazy"></div>`
    : `<div class="card-img"><div class="card-img-placeholder"><i class="ti ${THEME_ICON[r.theme]||'ti-file'}"></i></div></div>`;
  return `<div class="card">
    ${imgHtml}
    <div class="card-body">
      <div class="card-header">
        <div class="card-icon" style="background:${ic.bg};color:${ic.c}"><i class="ti ${ic.i}"></i></div>
        <div class="card-meta">
          <div class="card-title">${escHtml(r.titre)}</div>
          <div class="card-sub">${escHtml(r.theme||'')}</div>
        </div>
      </div>
      <p class="card-desc">${escHtml(r.desc||'')}</p>
      <div class="card-footer">
        <span class="badge b-${r.niveau}">${r.niveau}ème</span>
        <span class="badge b-${r.type}">${TYPE_LBL[r.type]||r.type}</span>
      </div>
      <div class="card-quiz-row">
        ${openBtn}
        ${quizBtn}
      </div>
    </div>
  </div>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

load();
buildThemes();
</script>
</body>
</html>
