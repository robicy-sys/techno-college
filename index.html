<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Techno Collège — Ressources pédagogiques</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f5f3;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.12);
    --border-hover: rgba(0,0,0,0.25);
    --text: #1a1a18;
    --text-muted: #6b6b68;
    --text-hint: #9b9b97;
    --radius-md: 8px;
    --radius-lg: 12px;
    --blue-bg: #E6F1FB;
    --blue-text: #185FA5;
    --blue-dark: #0C447C;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18;
      --surface: #242422;
      --border: rgba(255,255,255,0.12);
      --border-hover: rgba(255,255,255,0.25);
      --text: #f0ede8;
      --text-muted: #9b9b97;
      --text-hint: #6b6b68;
      --blue-bg: #042C53;
      --blue-text: #85B7EB;
      --blue-dark: #B5D4F4;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.5;
  }

  /* Header */
  header {
    background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    padding: 0 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 58px;
    position: sticky;
    top: 0;
    z-index: 20;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 500;
    font-size: 16px;
    text-decoration: none;
    color: var(--text);
  }
  .logo-icon {
    width: 34px; height: 34px;
    background: var(--blue-bg);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    color: var(--blue-text);
    font-size: 18px;
  }
  .header-right { display: flex; align-items: center; gap: 8px; }

  /* Buttons */
  .btn {
    border: 0.5px solid var(--border-hover);
    border-radius: var(--radius-md);
    padding: 7px 14px;
    font-size: 13px;
    cursor: pointer;
    background: transparent;
    color: var(--text);
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: inherit;
    transition: background 0.15s;
    text-decoration: none;
  }
  .btn:hover { background: var(--bg); }
  .btn-primary { background: #185FA5; color: #fff; border-color: #185FA5; }
  .btn-primary:hover { background: var(--blue-dark); border-color: var(--blue-dark); }

  /* Nav tabs */
  nav {
    background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    padding: 0 1.5rem;
    display: flex;
    gap: 2px;
    overflow-x: auto;
  }
  .nav-tab {
    padding: 11px 15px;
    font-size: 13px;
    cursor: pointer;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text-muted);
    background: none;
    white-space: nowrap;
    font-family: inherit;
    transition: color 0.15s;
  }
  .nav-tab:hover { color: var(--text); }
  .nav-tab.active { color: #185FA5; border-bottom-color: #185FA5; font-weight: 500; }

  /* Main */
  main { padding: 1.5rem; max-width: 1140px; margin: 0 auto; }

  /* Stats */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 1.5rem;
  }
  @media (max-width: 600px) { .stats { grid-template-columns: repeat(2, 1fr); } }
  .stat {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    padding: 1rem;
    text-align: center;
  }
  .stat-n { font-size: 24px; font-weight: 500; margin-bottom: 2px; }
  .stat-l { font-size: 12px; color: var(--text-muted); }

  /* Filters */
  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-wrap { position: relative; flex: 1; min-width: 180px; max-width: 320px; }
  .search-wrap .ti {
    position: absolute; left: 10px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-hint); font-size: 16px;
    pointer-events: none;
  }
  .search-wrap input {
    width: 100%;
    padding: 8px 10px 8px 34px;
    border: 0.5px solid var(--border-hover);
    border-radius: var(--radius-md);
    font-size: 13px;
    background: var(--surface);
    color: var(--text);
    font-family: inherit;
    outline: none;
  }
  .search-wrap input:focus { border-color: #185FA5; }
  .filter-chip {
    border: 0.5px solid var(--border-hover);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    cursor: pointer;
    background: transparent;
    color: var(--text-muted);
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    transition: all 0.15s;
  }
  .filter-chip:hover, .filter-chip.active {
    background: var(--blue-bg);
    border-color: #85B7EB;
    color: var(--blue-text);
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
    gap: 12px;
  }
  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    transition: border-color 0.15s;
    display: flex;
    flex-direction: column;
  }
  .card:hover { border-color: var(--border-hover); }
  .card-header { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 10px; }
  .card-icon {
    width: 38px; height: 38px;
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 19px;
    flex-shrink: 0;
  }
  .card-meta { flex: 1; min-width: 0; }
  .card-title { font-size: 14px; font-weight: 500; line-height: 1.3; margin-bottom: 3px; }
  .card-sub { font-size: 12px; color: var(--text-muted); }
  .card-desc {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.55;
    margin-bottom: 12px;
    flex: 1;
  }
  .card-footer { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .badges { display: flex; gap: 5px; flex-wrap: wrap; }
  .badge { font-size: 11px; padding: 3px 10px; border-radius: 12px; font-weight: 500; white-space: nowrap; }

  /* Badge colors */
  .b-6 { background: #EAF3DE; color: #27500A; }
  .b-5 { background: #FAEEDA; color: #633806; }
  .b-4 { background: #FAECE7; color: #712B13; }
  .b-3 { background: #EEEDFE; color: #3C3489; }
  .b-doc { background: #E6F1FB; color: #0C447C; }
  .b-vid { background: #FBEAF0; color: #72243E; }
  .b-lien { background: #EAF3DE; color: #27500A; }
  .b-ex { background: #FAEEDA; color: #633806; }

  @media (prefers-color-scheme: dark) {
    .b-6 { background: #173404; color: #C0DD97; }
    .b-5 { background: #412402; color: #FAC775; }
    .b-4 { background: #4A1B0C; color: #F0997B; }
    .b-3 { background: #26215C; color: #AFA9EC; }
    .b-doc { background: #042C53; color: #85B7EB; }
    .b-vid { background: #4B1528; color: #ED93B1; }
    .b-lien { background: #173404; color: #97C459; }
    .b-ex { background: #412402; color: #EF9F27; }
  }

  .card-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .icon-btn {
    width: 30px; height: 30px;
    border: 0.5px solid var(--border);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    background: transparent;
    color: var(--text-muted);
    font-size: 15px;
    transition: all 0.15s;
    text-decoration: none;
  }
  .icon-btn:hover { background: var(--bg); color: var(--text); border-color: var(--border-hover); }
  .icon-btn.danger:hover { background: #FCEBEB; color: #A32D2D; border-color: #F09595; }

  /* Empty */
  .empty {
    text-align: center;
    padding: 4rem 1rem;
    color: var(--text-muted);
    grid-column: 1 / -1;
  }
  .empty .ti { font-size: 36px; display: block; margin-bottom: 10px; color: var(--text-hint); }

  /* Modal */
  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    width: min(480px, 100%);
    max-height: 90vh;
    overflow-y: auto;
    border: 0.5px solid var(--border);
  }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
  .modal h2 { font-size: 16px; font-weight: 500; }
  .form-row { margin-bottom: 1rem; }
  .form-row label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 5px; }
  .form-row input,
  .form-row textarea,
  .form-row select {
    width: 100%;
    padding: 8px 10px;
    border: 0.5px solid var(--border-hover);
    border-radius: var(--radius-md);
    font-size: 13px;
    background: var(--surface);
    color: var(--text);
    font-family: inherit;
    outline: none;
  }
  .form-row input:focus,
  .form-row textarea:focus,
  .form-row select:focus { border-color: #185FA5; }
  .form-row textarea { resize: vertical; min-height: 75px; }
  .form-row select { cursor: pointer; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 1.25rem; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 1.5rem; right: 1.5rem;
    background: var(--text);
    color: var(--surface);
    padding: 10px 18px;
    border-radius: var(--radius-md);
    font-size: 13px;
    z-index: 200;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.2s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<header>
  <a class="logo" href="#">
    <div class="logo-icon"><i class="ti ti-tool"></i></div>
    Techno Collège
  </a>
  <div class="header-right">
    <button class="btn" onclick="exportData()" title="Exporter les ressources">
      <i class="ti ti-download"></i> Exporter
    </button>
    <label class="btn" title="Importer des ressources" style="cursor:pointer">
      <i class="ti ti-upload"></i> Importer
      <input type="file" accept=".json" style="display:none" onchange="importData(event)">
    </label>
    <button class="btn btn-primary" onclick="openModal()">
      <i class="ti ti-plus"></i> Ajouter
    </button>
  </div>
</header>

<nav>
  <button class="nav-tab active" onclick="setTab(this,'')">Tout</button>
  <button class="nav-tab" onclick="setTab(this,'6')">6ème</button>
  <button class="nav-tab" onclick="setTab(this,'5')">5ème</button>
  <button class="nav-tab" onclick="setTab(this,'4')">4ème</button>
  <button class="nav-tab" onclick="setTab(this,'3')">3ème</button>
</nav>

<main>
  <div class="stats">
    <div class="stat"><div class="stat-n" id="s-total">0</div><div class="stat-l">ressources</div></div>
    <div class="stat"><div class="stat-n" id="s-doc">0</div><div class="stat-l">documents</div></div>
    <div class="stat"><div class="stat-n" id="s-vid">0</div><div class="stat-l">vidéos</div></div>
    <div class="stat"><div class="stat-n" id="s-ex">0</div><div class="stat-l">exercices</div></div>
  </div>

  <div class="filters">
    <div class="search-wrap">
      <i class="ti ti-search"></i>
      <input type="text" id="search" placeholder="Rechercher…" oninput="renderCards()">
    </div>
    <button class="filter-chip active" onclick="setType(this,'')">Tout type</button>
    <button class="filter-chip" onclick="setType(this,'document')"><i class="ti ti-file-text"></i> Document</button>
    <button class="filter-chip" onclick="setType(this,'video')"><i class="ti ti-video"></i> Vidéo</button>
    <button class="filter-chip" onclick="setType(this,'lien')"><i class="ti ti-link"></i> Lien</button>
    <button class="filter-chip" onclick="setType(this,'exercice')"><i class="ti ti-pencil"></i> Exercice</button>
  </div>

  <div class="grid" id="grid">
    <div class="empty"><i class="ti ti-loader"></i>Chargement…</div>
  </div>
</main>

<!-- Modal ajout -->
<div class="modal-bg" id="modal-bg" onclick="closeBg(event)">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-header">
      <h2 id="modal-title">Nouvelle ressource</h2>
      <button class="icon-btn" onclick="closeModal()" aria-label="Fermer"><i class="ti ti-x"></i></button>
    </div>
    <div class="form-row">
      <label for="f-titre">Titre *</label>
      <input type="text" id="f-titre" placeholder="Ex : Cours sur les matériaux">
    </div>
    <div class="form-row">
      <label for="f-desc">Description</label>
      <textarea id="f-desc" placeholder="Décrivez brièvement le contenu…"></textarea>
    </div>
    <div class="form-grid">
      <div class="form-row">
        <label for="f-type">Type</label>
        <select id="f-type">
          <option value="document">Document</option>
          <option value="video">Vidéo</option>
          <option value="lien">Lien web</option>
          <option value="exercice">Exercice / TP</option>
        </select>
      </div>
      <div class="form-row">
        <label for="f-niveau">Niveau</label>
        <select id="f-niveau">
          <option value="6">6ème</option>
          <option value="5">5ème</option>
          <option value="4">4ème</option>
          <option value="3">3ème</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <label for="f-theme">Thème</label>
      <input type="text" id="f-theme" placeholder="Ex : Matériaux, Informatique, Énergie…">
    </div>
    <div class="form-row">
      <label for="f-url">Lien / URL (optionnel)</label>
      <input type="url" id="f-url" placeholder="https://…">
    </div>
    <div class="form-actions">
      <button class="btn" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="addResource()"><i class="ti ti-check"></i> Ajouter</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const ICONS = {
  document: { i: 'ti-file-text', bg: '#E6F1FB', c: '#185FA5' },
  video:    { i: 'ti-video',     bg: '#FBEAF0', c: '#99355A' },
  lien:     { i: 'ti-link',      bg: '#EAF3DE', c: '#3B6D11' },
  exercice: { i: 'ti-pencil',    bg: '#FAEEDA', c: '#854F0B' },
};
const TYPE_LBL = { document:'Document', video:'Vidéo', lien:'Lien', exercice:'Exercice' };

const DEFAULTS = [
  { id:1, titre:'Introduction aux matériaux', desc:'Cours complet sur les familles de matériaux et leurs propriétés physiques.', type:'document', niveau:'6', theme:'Matériaux', url:'' },
  { id:2, titre:'TP : observer et classer les matériaux', desc:'Activité pratique en classe — fiche élève à imprimer et compléter.', type:'exercice', niveau:'6', theme:'Matériaux', url:'' },
  { id:3, titre:'Le défi du pont — projet interdisciplinaire', desc:'Séquence projet : concevoir un pont avec contraintes de coût et résistance.', type:'exercice', niveau:'5', theme:'Structures', url:'' },
  { id:4, titre:'Débuter avec Scratch', desc:'Tutoriel vidéo d\'introduction à la programmation par blocs pour les 5ème.', type:'video', niveau:'5', theme:'Informatique', url:'https://scratch.mit.edu' },
  { id:5, titre:'Les énergies renouvelables', desc:'Ressource interactive sur les différentes sources d\'énergie et leur impact environnemental.', type:'lien', niveau:'4', theme:'Énergie', url:'https://www.edf.fr/groupe-edf/espaces-dedies/jeunes-enseignants' },
  { id:6, titre:'Introduction à Python', desc:'Introduction au langage Python — activité débranchée puis codage en ligne.', type:'document', niveau:'4', theme:'Informatique', url:'' },
  { id:7, titre:'Projet maison connectée (IoT)', desc:'Séquence sur l\'Internet des objets avec micro:bit — capteurs et actionneurs.', type:'exercice', niveau:'3', theme:'Numérique', url:'' },
  { id:8, titre:'Annales brevet technologie', desc:'Sujets d\'entraînement complets avec corrigés détaillés pour préparer le brevet.', type:'document', niveau:'3', theme:'Révisions', url:'' },
];

let resources = [];
let nextId = 1;
let tabNiv = '';
let typeFilter = '';

function load() {
  try {
    const saved = localStorage.getItem('techno-ressources');
    if (saved) {
      const data = JSON.parse(saved);
      resources = data.resources || DEFAULTS;
      nextId = data.nextId || (Math.max(...resources.map(r => r.id)) + 1);
    } else {
      resources = [...DEFAULTS];
      nextId = DEFAULTS.length + 1;
    }
  } catch(e) {
    resources = [...DEFAULTS];
    nextId = DEFAULTS.length + 1;
  }
  renderCards();
}

function save() {
  localStorage.setItem('techno-ressources', JSON.stringify({ resources, nextId }));
}

function setTab(el, niv) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  tabNiv = niv;
  renderCards();
}

function setType(el, t) {
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  typeFilter = t;
  renderCards();
}

function renderCards() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const filtered = resources.filter(r => {
    if (tabNiv && r.niveau !== tabNiv) return false;
    if (typeFilter && r.type !== typeFilter) return false;
    if (q && !r.titre.toLowerCase().includes(q) && !r.desc.toLowerCase().includes(q) && !r.theme.toLowerCase().includes(q)) return false;
    return true;
  });

  const g = document.getElementById('grid');

  if (!filtered.length) {
    g.innerHTML = '<div class="empty"><i class="ti ti-search-off"></i>Aucune ressource trouvée</div>';
    updateStats();
    return;
  }

  g.innerHTML = filtered.map(r => {
    const ic = ICONS[r.type] || ICONS.document;
    const linkBtn = r.url
      ? `<a class="icon-btn" href="${escHtml(r.url)}" target="_blank" rel="noopener" title="Ouvrir le lien"><i class="ti ti-external-link"></i></a>`
      : '';
    return `<article class="card">
      <div class="card-header">
        <div class="card-icon" style="background:${ic.bg};color:${ic.c}"><i class="ti ${ic.i}"></i></div>
        <div class="card-meta">
          <div class="card-title">${escHtml(r.titre)}</div>
          <div class="card-sub">${escHtml(r.theme)}</div>
        </div>
      </div>
      <p class="card-desc">${escHtml(r.desc)}</p>
      <div class="card-footer">
        <div class="badges">
          <span class="badge b-${r.niveau}">${r.niveau}ème</span>
          <span class="badge b-${r.type}">${TYPE_LBL[r.type] || r.type}</span>
        </div>
        <div class="card-actions">
          ${linkBtn}
          <button class="icon-btn danger" onclick="deleteRes(${r.id})" title="Supprimer"><i class="ti ti-trash"></i></button>
        </div>
      </div>
    </article>`;
  }).join('');

  updateStats();
}

function updateStats() {
  document.getElementById('s-total').textContent = resources.length;
  document.getElementById('s-doc').textContent = resources.filter(r => r.type === 'document').length;
  document.getElementById('s-vid').textContent = resources.filter(r => r.type === 'video').length;
  document.getElementById('s-ex').textContent = resources.filter(r => r.type === 'exercice').length;
}

function deleteRes(id) {
  if (!confirm('Supprimer cette ressource ?')) return;
  resources = resources.filter(r => r.id !== id);
  save();
  renderCards();
  showToast('Ressource supprimée');
}

function openModal() {
  document.getElementById('modal-bg').classList.add('open');
  setTimeout(() => document.getElementById('f-titre').focus(), 50);
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
}

function closeBg(e) {
  if (e.target === document.getElementById('modal-bg')) closeModal();
}

function addResource() {
  const titre = document.getElementById('f-titre').value.trim();
  if (!titre) { document.getElementById('f-titre').focus(); return; }
  resources.unshift({
    id: nextId++,
    titre,
    desc: document.getElementById('f-desc').value.trim() || 'Aucune description.',
    type: document.getElementById('f-type').value,
    niveau: document.getElementById('f-niveau').value,
    theme: document.getElementById('f-theme').value.trim() || 'Général',
    url: document.getElementById('f-url').value.trim(),
  });
  save();
  ['f-titre','f-desc','f-theme','f-url'].forEach(id => document.getElementById(id).value = '');
  closeModal();
  renderCards();
  showToast('Ressource ajoutée');
}

function exportData() {
  const blob = new Blob([JSON.stringify({ resources, nextId }, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'ressources-techno.json';
  a.click();
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (Array.isArray(data.resources)) {
        resources = data.resources;
        nextId = data.nextId || (Math.max(...resources.map(r => r.id)) + 1);
        save();
        renderCards();
        showToast(`${resources.length} ressources importées`);
      }
    } catch(err) {
      alert('Fichier invalide.');
    }
    e.target.value = '';
  };
  reader.readAsText(file);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

load();
</script>
</body>
</html>
